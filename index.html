<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estúdio BPMN — playground bpmn-react</title>
    <!-- SPA fallback (hosts estáticos sem rewrite, ex.: GitHub Pages): restaura
         o path preservado pelo public/404.html. Ver README (Deploy). -->
    <script>
      (function () {
        try {
          var r = sessionStorage.redirect;
          delete sessionStorage.redirect;
          if (r && r !== location.href) history.replaceState(null, null, r);
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <!-- Marca: quadrado accent + glifo de nós conectados -->
    <link
      rel="icon"

    />
    <!-- IBM Plex Sans / Mono (Google Fonts) -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

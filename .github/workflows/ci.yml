name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs antigos do mesmo ref quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Regra nº 1 do Handoff 21 (fronteira EXECUTÁVEL): veta namespace legado
  # `@bpmn-react/*` e caminho interno da lib. Roda ANTES do build (zero-dep, sem
  # submódulo) para o vermelho apontar a FRONTEIRA, não um erro de resolve.
  guard-imports:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (sem submódulo — o guard só lê o código da app)
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Sem `cache: pnpm` de propósito: o guard é zero-dep e NÃO roda `pnpm
      # install`, então não há store pnpm para cachear — com o cache ligado, o
      # post-job de save falharia ("Path Validation Error") e reprovaria o job.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Self-test primeiro: sem ele o guard não conta como "executável".
      - name: Guard — self-test
        run: pnpm guard:selftest

      - name: Guard — fronteira (imports internos/legados)
        run: pnpm guard

  build-test:
    needs: guard-imports
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout (com submódulo bpmn pinado)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instala deps do app
        run: pnpm install --frozen-lockfile

      # Builda a biblioteca no commit PINADO do submódulo — NÃO usa `update-lib`
      # (que faria `git submodule update --remote` e moveria o ponteiro).
      - name: Builda a biblioteca (submódulo)
        run: |
          pnpm --dir bpmn install --frozen-lockfile
          pnpm --dir bpmn -r run build

      # Typecheck depois do build da lib — os aliases @buildtovalue/* resolvem
      # para os .d.ts em bpmn/packages/*/dist/esm.
      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      - name: Instala o Chromium do Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Build do app
        run: pnpm build

      - name: Testes (Playwright)
        run: pnpm test
